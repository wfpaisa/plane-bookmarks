<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=380" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Vista: Menú principal -->
    <div id="view-menu" class="view">
      <div class="header">
        <div class="header-title">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path
              d="M6.5 4C5.12 4 4 5.12 4 6.5v11C4 18.88 5.12 20 6.5 20h11c1.38 0 2.5-1.12 2.5-2.5v-11C20 5.12 18.88 4 17.5 4h-11ZM12 7l1.545 3.13L17 10.635l-2.5 2.437.59 3.443L12 14.885l-3.09 1.63.59-3.443L7 10.635l3.455-.505L12 7Z"
              fill="#9a73f6"
            />
          </svg>
          <span>Plane Bookmark</span>
        </div>
        <div id="status-indicator" class="status" title="Estado de conexión">
          <span class="status-dot"></span>
          <span class="status-text">Verificando...</span>
        </div>
      </div>
      <div class="menu-list">
        <button class="menu-item" id="btn-add-bookmark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"
              fill="currentColor"
            />
          </svg>
          <div class="menu-item-text">
            <span class="menu-item-title">Agregar bookmark</span>
            <span class="menu-item-desc">Guardar la pestaña actual</span>
          </div>
          <svg
            class="menu-arrow"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M9 6l6 6-6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <button class="menu-item hidden" id="btn-edit-bookmark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.003 1.003 0 000-1.42l-2.34-2.34a1.003 1.003 0 00-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"
              fill="currentColor"
            />
          </svg>
          <div class="menu-item-text">
            <span class="menu-item-title">Editar bookmark</span>
            <span class="menu-item-desc">Modificar el bookmark actual</span>
          </div>
          <svg
            class="menu-arrow"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M9 6l6 6-6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <button class="menu-item" id="btn-open-app">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"
              fill="currentColor"
            />
          </svg>
          <div class="menu-item-text">
            <span class="menu-item-title">Abrir Plane Bookmark</span>
            <span class="menu-item-desc">Ir a la aplicación</span>
          </div>
          <svg
            class="menu-arrow"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M9 6l6 6-6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <div class="menu-divider"></div>
        <button class="menu-item" id="btn-settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.49.49 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"
              fill="currentColor"
            />
          </svg>
          <div class="menu-item-text">
            <span class="menu-item-title">Configuración</span>
            <span class="menu-item-desc">URL del servidor</span>
          </div>
          <svg
            class="menu-arrow"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M9 6l6 6-6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </div>

    <!-- Vista: Agregar Bookmark -->
    <div id="view-add" class="view hidden">
      <div class="header">
        <button class="btn-back" id="btn-back-add">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M15 6l-6 6 6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <span>Agregar Bookmark</span>
      </div>
      <form id="bookmark-form" class="form-body">
        <div class="form-group">
          <label class="form-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path
                d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7a5 5 0 000 10h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4a5 5 0 000-10z"
                fill="currentColor"
              />
            </svg>
            URL
          </label>
          <input
            type="url"
            id="input-url"
            class="form-input"
            placeholder="https://ejemplo.com"
          />
        </div>

        <div class="form-group">
          <label class="form-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M5 4v3h5.5v12h3V7H19V4H5z" fill="currentColor" />
            </svg>
            Nombre
          </label>
          <input
            type="text"
            id="input-name"
            class="form-input"
            placeholder="Nombre del bookmark"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path
                d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4a2 2 0 00-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"
                fill="currentColor"
              />
            </svg>
            Tags
          </label>
          <input
            type="text"
            id="input-tags"
            class="form-input"
            placeholder="desarrollo, react, javascript"
          />
          <span class="form-hint">Separa los tags con comas</span>
        </div>

        <div class="form-group">
          <label class="form-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path
                d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"
                fill="currentColor"
              />
            </svg>
            Carpeta de destino
          </label>
          <select id="select-folder" class="form-input form-select">
            <option value="root">/ (raíz)</option>
          </select>
          <div id="folder-loading" class="form-hint hidden">
            Cargando carpetas...
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path
                d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"
                fill="currentColor"
              />
            </svg>
            Favicon
          </label>
          <div class="favicon-row">
            <img
              id="favicon-preview"
              class="favicon-img hidden"
              alt="favicon"
              width="24"
              height="24"
            />
            <button
              type="button"
              id="btn-fetch-favicon"
              class="btn btn-secondary btn-sm"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path
                  d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"
                  fill="currentColor"
                />
              </svg>
              Obtener favicon
            </button>
            <button
              type="button"
              id="btn-remove-favicon"
              class="btn btn-danger btn-sm hidden"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path
                  d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"
                  fill="currentColor"
                />
              </svg>
            </button>
          </div>
        </div>

        <div id="form-message" class="form-message hidden"></div>

        <div class="form-actions">
          <button type="button" id="btn-cancel-add" class="btn btn-secondary">
            Cancelar
          </button>
          <button type="submit" id="btn-save" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path
                d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"
                fill="currentColor"
              />
            </svg>
            Guardar
          </button>
        </div>
      </form>
    </div>

    <!-- Vista: Configuración -->
    <div id="view-settings" class="view hidden">
      <div class="header">
        <button class="btn-back" id="btn-back-settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M15 6l-6 6 6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <span>Configuración</span>
      </div>
      <form id="settings-form" class="form-body">
        <div class="form-group">
          <label class="form-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
                fill="currentColor"
              />
            </svg>
            URL del servidor
          </label>
          <input
            type="url"
            id="input-server-url"
            class="form-input"
            placeholder="http://localhost:3001"
          />
          <span class="form-hint"
            >URL base del servidor (API y aplicación)</span
          >
        </div>

        <div id="settings-message" class="form-message hidden"></div>

        <div class="form-actions">
          <button
            type="button"
            id="btn-cancel-settings"
            class="btn btn-secondary"
          >
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path
                d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"
                fill="currentColor"
              />
            </svg>
            Guardar
          </button>
        </div>
      </form>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
